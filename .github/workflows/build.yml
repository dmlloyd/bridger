name: Module Services Plugin CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build with Maven
        run: mvn -B -ntp -fae -Pjboss-release -Dgpg.skip=true clean package
